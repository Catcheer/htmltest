    function handleImage(data) {
      const img = new Image();
      img.src = "data:image/jpeg;base64," + data;

      img.onload = async () => {
        console.log('img.onload-------------------------------------========================')

        // 创建画布 resize 到 224x224
        const canvas = document.createElement("canvas");
        canvas.width = 192;
        canvas.height = 192;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, 192, 192);

        const imageData = ctx.getImageData(0, 0, 192, 192).data;
        const input = new Float32Array(1 * 3 * 192 * 192);
        let j = 0;
        for (let i = 0; i < imageData.length; i += 4) {
          input[j++] = imageData[i] / 255;     // R
          input[j++] = imageData[i + 1] / 255; // G
          input[j++] = imageData[i + 2] / 255; // B
        }

        console.log('input------------', input)
        console.log("Model input names:", session.inputNames);

        // const tensor = new ort.Tensor("float32", input, [1, 3, 192, 192]);
        // const feeds = { image: tensor };
        // const results = await session.run(feeds);

        try {
          const inputTensor = new ort.Tensor("float32", input, [1, 3, 192, 192]);
          console.log("推理中...");
          const results = await session.run({ [session.inputNames[0]]: inputTensor });
          console.log("results----------:", results);
          const output = results[Object.keys(results)[0]].data;

          window.ReactNativeWebView.postMessage(
            JSON.stringify({
              type: "result",
              data: Array.from(output)
            })
          );
        } catch (e) {
          console.log("出错: " + e.message);
        }





      };

    }



    async function receiveMessage(event) {
      console.log('message-------------------------------------');
      console.log('addEventListener---------------------', event);

      const msg = JSON.parse(event.data);

      console.log('msg----------------', msg);

      if (msg.type === "image") {
        await modelReady;
        handleImage(msg.data);
      }
    }




    document.addEventListener("message", receiveMessage); // RN WebView
    window.addEventListener("message", receiveMessage);   // 浏览器
