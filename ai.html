<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <!-- <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script> -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
</head>

<body>

  <script>





    let session = null;

    async function loadModel() {

      session = await ort.InferenceSession.create("./FaceLandmarkDetector_merged.onnx", {
        executionProviders: ["webgl"]
      });

      console.log("model loaded");

    }

    // 用 Promise 表示模型加载状态
    let modelReady = loadModel();



    window.addEventListener("message", async (event) => {
      console.log('addEventListener---------------------', event)


      const msg = JSON.parse(event.data);

      if (msg.type === "image") {
        // 等待模型加载完成
        await modelReady;
        const img = new Image();
        img.src = "data:image/jpeg;base64," + msg.data;

        img.onload = async () => {

          // 创建画布 resize 到 224x224
          const canvas = document.createElement("canvas");
          canvas.width = 256;
          canvas.height = 256;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, 256, 256);

          const imageData = ctx.getImageData(0, 0, 256, 256).data;
          const input = new Float32Array(1 * 3 * 256 * 256);
          let j = 0;
          for (let i = 0; i < imageData.length; i += 4) {
            input[j++] = imageData[i] / 255;     // R
            input[j++] = imageData[i + 1] / 255; // G
            input[j++] = imageData[i + 2] / 255; // B
          }

          console.log('input------------', input)
          console.log("Model input names:", session.inputNames);

          const tensor = new ort.Tensor("float32", input, [1, 3, 256, 256]);
          const feeds = { image: tensor };
          const results = await session.run(feeds);

          console.log("results----------:", results);

          const output = results[Object.keys(results)[0]].data;

          window.ReactNativeWebView.postMessage(
            JSON.stringify({
              type: "result",
              data: Array.from(output)
            })
          );

        };

      }

    });

  </script>
  <div>hhhh</div>
  <h1>hahhah1</h1>
  <h2>hahhah2</h2>
  <h2>hahhah3</h2>

</body>

</html>
