<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>

<h1>ONNX Face Detector Test</h1>
<input id="myfile" type="file" accept="image/*">
<button onclick="start()">Start</button>

<script>
let session = null;

// 加载模型
async function loadModel() {
    session = await ort.InferenceSession.create('./FaceDetector_merged.onnx');
    console.log("Model loaded");
}
loadModel();

async function start() {
    if (!session) {
        alert("Model not loaded yet!");
        return;
    }

    const myfile = document.querySelector('#myfile').files[0];
    if (!myfile) {
        alert("Please select an image first!");
        return;
    }

    // 用 FileReader 读取图片
    const reader = new FileReader();
    reader.onload = async (e) => {
        const img = new Image();
        img.src = e.target.result;

        img.onload = async () => {
            // 创建画布 resize 到 224x224
            const canvas = document.createElement("canvas");
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, 256, 256);

            const imageData = ctx.getImageData(0, 0, 256, 256).data;
            const input = new Float32Array(1 * 3 * 256 * 256);
            let j = 0;
            for (let i = 0; i < imageData.length; i += 4) {
                input[j++] = imageData[i] / 255;     // R
                input[j++] = imageData[i + 1] / 255; // G
                input[j++] = imageData[i + 2] / 255; // B
            }

            console.log('input------------',input)
            console.log("Model input names:", session.inputNames);

            const tensor = new ort.Tensor("float32", input, [1, 3, 256, 256]);
            const feeds = { image: tensor };
            const results = await session.run(feeds);

            const output = results[Object.keys(results)[0]].data;
            console.log("Inference result:", output);
            alert("Inference finished, check console for result");
        };
    };

    reader.readAsDataURL(myfile);
}
</script>

<input id="myfile" type="file" />

<button onclick="start()">start</button>

</body>
</html>
