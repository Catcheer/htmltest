<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ONNX 人脸检测测试</title>
   <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #output { background: #f4f4f4; padding: 10px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
        canvas { border: 1px solid #ccc; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <h1>ONNX 人脸检测</h1>
    <p>1. 选择图片 -> 2. 点击开始推理</p>
    
    <input id="myfile" type="file" accept="image/*">
    <button onclick="startInference()">开始推理</button>

    <canvas id="inputCanvas" width="256" height="256"></canvas>
    <div id="output">控制台输出将显示在这里...</div>

    <script>
        let session = null;

       

        // 初始化加载模型
        async function loadModel() {
            try {
                log("正在加载模型...");
                // 替换为你的模型路径
                session = await ort.InferenceSession.create('./FaceDetector_merged.onnx?t=' + Date.now(),{
                    executionProviders: ['webgl'], // ⚡ 使用 GPU 加速
    // executionProviders: ['wasm'] ,
    graphOptimizationLevel: 'disabled', // 禁用图优化，减少内存占用
    wasm: {
                numThreads: 1,
                memory: 128 * 1024 * 1024  // ⚡ 128MB 内存
            }
});
                log("模型加载成功！");
            } catch (e) {
                log("模型加载失败: " + e.message);
                console.error(e);
            }
        }
        loadModel();

        async function startInference() {
            if (!session) {
                alert("模型尚未加载完成，请稍候");
                return;
            }

            const fileInput = document.getElementById('myfile');
            if (fileInput.files.length === 0) {
                alert("请先选择一张图片");
                return;
            }

            const file = fileInput.files[0];
            const img = new Image();
            img.src = URL.createObjectURL(file);

            img.onload = async () => {
                log("正在预处理图像...");
                
                // 1. 准备 Canvas 并缩放图片到 256x256
                const canvas = document.getElementById("inputCanvas");
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, 256, 256);

                // 2. 获取像素数据
                const imageData = ctx.getImageData(0, 0, 256, 256).data;
                
                // 3. 预处理：从 RGBA 转换为 NCHW 格式 (1, 3, 256, 256)
                const float32Data = new Float32Array(1 * 3 * 256 * 256);
                const area = 256 * 256;

                for (let i = 0; i < area; i++) {
                    // imageData 布局是 [R, G, B, A, R, G, B, A, ...]
                    float32Data[i] = imageData[i * 4] / 255.0;            // R 通道平面
                    float32Data[i + area] = imageData[i * 4 + 1] / 255.0;      // G 通道平面
                    float32Data[i + area * 2] = imageData[i * 4 + 2] / 255.0;  // B 通道平面
                }

                // 4. 创建 Tensor
                const inputTensor = new ort.Tensor("float32", float32Data, [1, 3, 256, 256]);

                // 5. 自动获取模型输入节点的名称 (动态适配不同模型)
                const inputName = session.inputNames[0]; 
                const feeds = {};
                feeds[inputName] = inputTensor;

                try {
                    log("正在执行推理...");
                    const start = performance.now();
                    const results = await session.run(feeds);
                    const end = performance.now();

                    // 6. 获取输出结果
                    const outputName = session.outputNames[0];
                    const outputData = results[outputName].data;

                    log(`推理完成！耗时: ${(end - start).toFixed(2)}ms`);
                    log("输出数据预览 (前10个数值): \n" + Array.from(outputData.slice(0, 10)).join(", "));
                    
                    console.log("完整输出对象:", results);
                } catch (e) {
                    log("推理过程出错: " + e.message);
                }
            };
        }

        function log(msg) {
            const el = document.getElementById("output");
            el.innerText += "\n" + msg;
            console.log(msg);
        }
    </script>
</body>
</html>
