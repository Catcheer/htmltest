<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>ONNX 人脸精准检测</title>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
<style>
  body { font-family: sans-serif; padding: 20px; background: #1a1a1a; color: #eee; text-align: center; }
  #output { background: #333; padding: 10px; border-radius: 5px; margin: 20px auto; max-width: 710px; font-family: monospace; }
  .controls { margin-bottom: 20px; }
  .canvas-container { position: relative; display: inline-block; border: 2px solid #444; }
  canvas { display: block; }
  #inputCanvas { display: none; }
</style>
</head>
<body>
<h1>ONNX 人脸精准检测 (Letterbox)</h1>

<div class="controls">
  <input id="myfile" type="file" accept="image/*" />
  <button onclick="startInference()">开始推理</button>
</div>

<div class="canvas-container">
  <canvas id="outputCanvas"></canvas>
</div>

<canvas id="inputCanvas" width="192" height="192"></canvas>

<div id="output">状态：等待模型加载...</div>

<script>
let session = null;
let letterboxInfo = { scale: 1, padX: 0, padY: 0, origW: 0, origH: 0 };

async function loadModel() {
  try {
    log("正在加载模型...");
    session = await ort.InferenceSession.create("./FaceLandmarkDetector_merged.onnx", {
      executionProviders: ["webgl"]
    });
    log("模型加载成功！请选择图片并点击开始。");
  } catch (e) {
    log("模型加载失败: " + e.message);
  }
}
loadModel();

async function startInference() {
  if (!session) return alert("模型尚未就绪");
  const fileInput = document.getElementById("myfile");
  if (!fileInput.files[0]) return alert("请先选择图片");

  const img = new Image();
  img.src = URL.createObjectURL(fileInput.files[0]);

  img.onload = async () => {
    log("正在预处理...");
    const inputSize = 192;
    const inputCanvas = document.getElementById("inputCanvas");
    const ictx = inputCanvas.getContext("2d");

    // Letterbox 计算
    const scale = Math.min(inputSize / img.width, inputSize / img.height);
    const newW = img.width * scale;
    const newH = img.height * scale;
    const padX = (inputSize - newW) / 2;
    const padY = (inputSize - newH) / 2;

    letterboxInfo = { scale, padX, padY, origW: img.width, origH: img.height };

    ictx.fillStyle = "black";
    ictx.fillRect(0, 0, inputSize, inputSize);
    ictx.drawImage(img, padX, padY, newW, newH);

    // 提取 Tensor
    const imageData = ictx.getImageData(0, 0, inputSize, inputSize).data;
    const float32Data = new Float32Array(3 * inputSize * inputSize);
    for (let i = 0; i < inputSize * inputSize; i++) {
      float32Data[i] = imageData[i * 4] / 255.0;
      float32Data[i + 36864] = imageData[i * 4 + 1] / 255.0;
      float32Data[i + 73728] = imageData[i * 4 + 2] / 255.0;
    }
    const inputTensor = new ort.Tensor("float32", float32Data, [1, 3, 192, 192]);

    try {
      log("推理中...");
      const results = await session.run({ [session.inputNames[0]]: inputTensor });
      drawFinalResult(img, results);
    } catch (e) {
      log("出错: " + e.message);
    }
  };
}

function drawFinalResult(originalImg, results) {
  const canvas = document.getElementById("outputCanvas");
  const ctx = canvas.getContext("2d");

  // 按原图比例调整 canvas
  const maxW = 710, maxH = 914;
  const scale = Math.min(maxW / originalImg.width, maxH / originalImg.height);
  const displayW = originalImg.width * scale;
  const displayH = originalImg.height * scale;
  canvas.width = displayW;
  canvas.height = displayH;

  ctx.clearRect(0, 0, displayW, displayH);
  ctx.drawImage(originalImg, 0, 0, displayW, displayH);

  const rawData = results.landmarks.data || results.landmarks;

  ctx.fillStyle = "#00FFFF";
  ctx.shadowBlur = 2;
  ctx.shadowColor = "black";

  for (let i = 0; i < rawData.length; i += 3) {
    const x192 = rawData[i] * 192;
    const y192 = rawData[i + 1] * 192;

    const xOrig = (x192 - letterboxInfo.padX) / letterboxInfo.scale;
    const yOrig = (y192 - letterboxInfo.padY) / letterboxInfo.scale;

    const finalX = xOrig * scale;
    const finalY = yOrig * scale;

    ctx.beginPath();
    ctx.arc(finalX, finalY, 2, 0, 2 * Math.PI);
    ctx.fill();
  }

  log("检测完成，关键点已叠加。");
}

function log(msg) {
  document.getElementById("output").innerText = msg;
  console.log(msg);
}
</script>
</body>
</html>
